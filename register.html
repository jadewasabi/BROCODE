<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

 <header class="header">
      <nav class="navbar">
        <h2 class="logo"><a href="#">BroCode</a></h2>
        <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" id="hamburger-btn">
          <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24">
            <path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </label>
        <ul class="links">
          <li><a href="join.html">Login</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="contact.html">Contact Us</a></li>
        </ul>
      </nav>
    </header>

<div class="wrapper">
    <form id="signup" novalidate>
      <h2>Sign Up</h2>
      <div class="input-field">
        <input type="text" id="username" name="username" required />
        <label for="username">Enter a username</label>
      </div>
      <div class="input-field">
        <input type="password" id="password" name="password" required />
        <label for="password">Enter a password</label>
        <button type="button" class="password-toggle" onclick="togglePassword('password', this)" tabindex="-1" aria-label="Toggle password visibility">
          <svg class="eye-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg class="eye-off-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
            <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
          </svg>
        </button>
      </div>
      <button type="submit">Sign Up</button>
      <div id="signupMsg" style="margin-top:12px;display:none;color:#fff;font-weight:600;"></div>
      <div id="signupErr" style="margin-top:12px;display:none;color:#ffb3b3;font-weight:600;"></div>
    </form>
    <div class="register">
      <p>Already have an account? <a href="join.html">Login</a></p>
    </div>
  </div>

  <script>
    const tokenKey = 'aid4_token';

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const eyeIcon = btn.querySelector('.eye-icon');
      const eyeOffIcon = btn.querySelector('.eye-off-icon');
      if (input.type === 'password') {
        input.type = 'text';
        eyeIcon.style.display = 'none';
        eyeOffIcon.style.display = 'block';
      } else {
        input.type = 'password';
        eyeIcon.style.display = 'block';
        eyeOffIcon.style.display = 'none';
      }
    }

    document.getElementById('signup').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      const res = await fetch('/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const err = document.getElementById('signupErr');
        err.style.display = 'block';
        err.textContent = data?.error || 'Sign up failed.';
        return;
      }

      localStorage.setItem(tokenKey, data.token || '');

      const msg = document.getElementById('signupMsg');
      msg.style.display = 'block';
      msg.textContent = 'You successfully signed up!';

      // Keep user on register.html per requirement.
    });
  </script>
</body>
</html>
