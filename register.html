<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

 <header class="header">
      <nav class="navbar">
        <h2 class="logo"><a href="#">AID4PROGRAMMERS</a></h2>
        <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" id="hamburger-btn">
          <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24">
            <path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </label>
        <ul class="links">
          <li><a href="join.html">Login</a></li>
          <li><a href="#">About Us</a></li>
          <li><a href="#">Services</a></li>
          <li><a href="#">Portfolio</a></li>
          <li><a href="#">Contact Us</a></li>
        </ul>
      </nav>
    </header>

<div class="wrapper">
    <form id="signup" novalidate>
      <h2>Sign Up</h2>
      <div class="input-field">
        <input type="text" id="username" name="username" required />
        <label for="username">Enter a username</label>
      </div>
      <div class="input-field">
        <input type="password" id="password" name="password" required />
        <label for="password">Enter a password</label>
      </div>
      <button type="submit">Sign Up</button>
      <div id="signupMsg" style="margin-top:12px;display:none;color:#fff;font-weight:600;"></div>
      <div id="signupErr" style="margin-top:12px;display:none;color:#ffb3b3;font-weight:600;"></div>
    </form>
    <div class="register">
      <p>Already have an account? <a href="join.html">Login</a></p>
    </div>
  </div>

  <script>
    const tokenKey = 'aid4_token';

    document.getElementById('signup').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      const res = await fetch('/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const err = document.getElementById('signupErr');
        err.style.display = 'block';
        err.textContent = data?.error || 'Sign up failed.';
        return;
      }

      localStorage.setItem(tokenKey, data.token || '');

      const msg = document.getElementById('signupMsg');
      msg.style.display = 'block';
      msg.textContent = 'You successfully signed up!';

      // Keep user on register.html per requirement.
    });
  </script>
</body>
</html>
